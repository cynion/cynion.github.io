<style type="text/css">
  body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    position: absolute;
    background: #f5f3f1;
    color: #3b3e4e;
    font-family: "Fraunces", serif;
    font-optical-sizing: auto;
    font-weight: 300;
    font-style: normal;
    font-size: 1.2em;
    line-height: 1.6;
  }
  @media only screen and (min-width: 420px) {
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
  }
  #content {
    max-width: 37.5rem;
    padding: 1em 2em;
  }
  a {
    color: currentColor;
    text-decoration-line: underline;
    text-underline-offset: 0.25em;
    text-decoration-skip-ink: none;
    text-decoration-color: #3b3e4e;
  }
  a:hover {
    text-decoration-color: #000;
  }
  h1 {
    display: none;
  }
  h2 {
    font-size: 1.4em;
    line-height: 1.2;
    font-weight: 500;
  }
  h3 {
    font-size: 1em;
    line-height: 1.2;
    font-weight: 500;
  }
  ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    padding: 0;
  }
  li + li::before {
    content: '';
    display: inline-block;
    vertical-align: middle;
    margin: 0 1ch;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background-color: currentColor;
  }
  hr {
    border: 0;
    height: 1px;
    background: #3b3e4e;
  }
</style>
</head>

  <div id="content">
    <h1>Cynion</h1>
